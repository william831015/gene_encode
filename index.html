<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --A: #ff4d6d;
    --T: #4dffb4;
    --C: #4d9fff;
    --G: #ffcc4d;
    --text: #e0e0f0;
    --muted: #555570;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(255,77,109,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(77,159,255,0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    position: relative;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 6rem);
    letter-spacing: 0.1em;
    line-height: 1;
  }

  h1 span:nth-child(1) { color: var(--A); }
  h1 span:nth-child(2) { color: var(--T); }
  h1 span:nth-child(3) { color: var(--C); }
  h1 span:nth-child(4) { color: var(--G); }

  .subtitle {
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  .legend {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .container {
    width: 100%;
    max-width: 800px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    position: relative;
  }

  .mode-toggle {
    display: flex;
    align-self: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 0.5rem;
  }

  .mode-btn {
    padding: 0.6rem 2rem;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .mode-btn.active {
    background: var(--border);
    color: var(--text);
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .panel-label {
    padding: 0.7rem 1rem;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  textarea {
    width: 100%;
    min-height: 140px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    padding: 1rem;
    resize: vertical;
    line-height: 1.8;
  }

  textarea::placeholder { color: var(--muted); }

  .output-display {
    min-height: 140px;
    padding: 1rem;
    font-size: 0.9rem;
    line-height: 1.8;
    word-break: break-all;
    letter-spacing: 0.05em;
  }

  .char-A { color: var(--A); }
  .char-T { color: var(--T); }
  .char-C { color: var(--C); }
  .char-G { color: var(--G); }
  .char-sep { color: var(--muted); }

  .arrow-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1rem;
  }

  .convert-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    padding: 0.7rem 2.5rem;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }

  .convert-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,77,109,0.1), rgba(77,159,255,0.1));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .convert-btn:hover::before { opacity: 1; }
  .convert-btn:hover { border-color: var(--A); }

  .copy-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    text-transform: uppercase;
    transition: color 0.2s;
    padding: 0.2rem 0.5rem;
  }

  .copy-btn:hover { color: var(--T); }


  .footer {
    margin-top: 2.5rem;
    text-align: center;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  .footer a {
    color: var(--T);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s, color 0.2s;
  }

  .footer a:hover {
    color: var(--text);
    border-bottom-color: var(--T);
  }

  .threads-icon {
    display: inline-block;
    vertical-align: middle;
    margin-right: 0.3em;
    opacity: 0.7;
  }
</style>
</head>
<body>
<div class="grid-bg"></div>

<header>
  <h1><span style="color:var(--A)">G</span><span style="color:var(--T)">e</span><span style="color:var(--C)">n</span><span style="color:var(--G)">e</span><span style="color:var(--text)">ncoder</span></h1>
</header>

<div class="container">
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-encode" onclick="setMode('encode')">ENCODE</button>
    <button class="mode-btn" id="btn-decode" onclick="setMode('decode')">DECODE</button>
  </div>

  <div class="panel">
    <div class="panel-label" id="input-label">INPUT TEXT</div>
    <textarea id="input" placeholder="Type anything here..."></textarea>
  </div>

  <div class="arrow-row">
    <button class="convert-btn" onclick="convert()">▼ CONVERT ▼</button>
  </div>

  <div class="panel">
    <div class="panel-label">
      <span id="output-label">ENCODED OUTPUT</span>
      <button class="copy-btn" onclick="copyOutput()">[ COPY ]</button>
    </div>
    <div class="output-display" id="output"></div>
  </div>
</div>

<script>
  // Encoding strategy:
  // Each character type gets a 2-letter header: type-letter + scramble-letter
  // The scramble-letter encodes a random 2-bit salt (0-3) used to XOR the codepoint
  // This randomizes the output so identical chars look different & no AAAA runs
  //
  // ASCII  (0–127):   'A' + salt(1 letter) + 4 payload letters  = 6 total
  // Mid    (128–16383):'T' + salt(1 letter) + 7 payload letters  = 9 total
  // High   (16384+):  'C' + salt(1 letter) + 11 payload letters = 13 total
  //
  // salt letter encodes a random 2-bit value (A=00,T=01,C=10,G=11)
  // payload = codepoint XOR (salt * spread) encoded as ATCG

  const TO_ATCG = { '00':'A', '01':'T', '10':'C', '11':'G' };
  const FROM_ATCG = { 'A':'00', 'T':'01', 'C':'10', 'G':'11' };
  const ATCG_VALS = { 'A':0, 'T':1, 'C':2, 'G':3 };

  function bitsToAtcg(bin) {
    let r = '';
    for (let i = 0; i < bin.length; i += 2) r += TO_ATCG[bin[i] + bin[i+1]];
    return r;
  }

  function randomSalt() {
    return Math.floor(Math.random() * 4); // 0-3
  }

  function saltLetter(s) {
    return ['A','T','C','G'][s];
  }

  function charToAbcd(ch) {
    const cp = ch.codePointAt(0);
    const salt = randomSalt();
    const sl = saltLetter(salt);

    if (cp <= 127) {
      // XOR with salt spread across 8-bit range: salt * 32 (keeps within meaningful bits)
      const scrambled = cp ^ (salt * 31);
      return 'A' + sl + bitsToAtcg(scrambled.toString(2).padStart(8, '0'));
    } else if (cp <= 16383) {
      const scrambled = cp ^ (salt * 4095);
      return 'T' + sl + bitsToAtcg(scrambled.toString(2).padStart(14, '0'));
    } else {
      const scrambled = cp ^ (salt * 16383);
      return 'C' + sl + bitsToAtcg(scrambled.toString(2).padStart(22, '0'));
    }
  }

  function decode(text) {
    const clean = text.toUpperCase().replace(/[^ATCG]/g, '');
    const result = [];
    let i = 0;
    while (i < clean.length) {
      const type = clean[i];
      let payloadLetters, spread;
      if      (type === 'A') { payloadLetters = 4;  spread = 31;    }
      else if (type === 'T') { payloadLetters = 7;  spread = 4095;  }
      else if (type === 'C') { payloadLetters = 11; spread = 16383; }
      else { i++; continue; }

      if (i + 2 + payloadLetters > clean.length) break;
      const salt = ATCG_VALS[clean[i + 1]];
      const token = clean.slice(i + 2, i + 2 + payloadLetters);

      let bin = '';
      for (const ch of token) bin += FROM_ATCG[ch] || '00';
      const scrambled = parseInt(bin, 2);
      const cp = scrambled ^ (salt * spread);
      try { result.push(String.fromCodePoint(cp)); } catch { result.push('?'); }
      i += 2 + payloadLetters;
    }
    return result.join('');
  }

  function encode(text) {
    return Array.from(text).map(charToAbcd).join('');
  }

  let mode = 'encode';

  function setMode(m) {
    mode = m;
    document.getElementById('btn-encode').classList.toggle('active', m === 'encode');
    document.getElementById('btn-decode').classList.toggle('active', m === 'decode');
    document.getElementById('input-label').textContent = m === 'encode' ? 'INPUT TEXT' : 'ENCODED INPUT (ATCG)';
    document.getElementById('output-label').textContent = m === 'encode' ? 'ENCODED OUTPUT' : 'DECODED TEXT';
    document.getElementById('input').placeholder = m === 'encode' ? 'Type anything here... (any language, emoji, symbols)' : 'Paste ATCG encoded text here...';
    document.getElementById('input').value = '';
    document.getElementById('output').innerHTML = '';
    document.getElementById('output').style.color = '';
  }

  function colorize(encoded) {
    return encoded.split('').map(ch => {
      if (ch === ' ') return '<span class="char-sep"> </span>';
      return `<span class="char-${ch}">${ch}</span>`;
    }).join('');
  }

  function convert() {
    const input = document.getElementById('input').value;
    const out = document.getElementById('output');
    if (!input.trim()) { out.innerHTML = ''; return; }
    if (mode === 'encode') {
      out.style.color = '';
      out.innerHTML = colorize(encode(input));
    } else {
      out.style.color = 'var(--T)';
      out.textContent = decode(input);
    }
  }

  document.getElementById('input').addEventListener('input', convert);

  function copyOutput() {
    const text = document.getElementById('output').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '[ COPIED! ]';
      setTimeout(() => btn.textContent = '[ COPY ]', 1500);
    });
  }

  // Generate favicon via canvas
  (function() {
    const c = document.createElement('canvas');
    c.width = c.height = 64;
    const ctx = c.getContext('2d');

    // Background
    ctx.fillStyle = '#0a0a0f';
    ctx.beginPath();
    ctx.roundRect(0, 0, 64, 64, 10);
    ctx.fill();

    // Letters A T C G in 2x2 grid, large and bold
    const letters = [
      { ch: 'A', color: '#ff4d6d', x: 8,  y: 28 },
      { ch: 'T', color: '#4dffb4', x: 34, y: 28 },
      { ch: 'C', color: '#4d9fff', x: 8,  y: 56 },
      { ch: 'G', color: '#ffcc4d', x: 34, y: 56 },
    ];

    ctx.font = 'bold 28px monospace';
    letters.forEach(({ ch, color, x, y }) => {
      ctx.fillStyle = color;
      ctx.fillText(ch, x, y);
    });

    document.getElementById('favicon').href = c.toDataURL('image/png');
  })();
</script>
