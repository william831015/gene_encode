<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'Courier New', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Grid background */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* Glow blobs */
  .blob1 {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,77,109,0.18) 0%, transparent 70%);
    top: -100px; left: -100px;
  }
  .blob2 {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(77,159,255,0.18) 0%, transparent 70%);
    bottom: -100px; right: -100px;
  }

  /* DNA strands running across top and bottom */
  .dna-top, .dna-bottom {
    position: absolute;
    left: 0; right: 0;
    font-size: 15px;
    letter-spacing: 0.08em;
    opacity: 0.25;
    white-space: nowrap;
    overflow: hidden;
  }
  .dna-top { top: 18px; }
  .dna-bottom { bottom: 18px; }

  .A { color: #ff4d6d; }
  .T { color: #4dffb4; }
  .C { color: #4d9fff; }
  .G { color: #ffcc4d; }

  /* Center content */
  .center {
    position: relative;
    z-index: 10;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  h1 {
    font-family: 'Courier New', monospace;
    font-size: 112px;
    font-weight: 900;
    letter-spacing: 0.04em;
    line-height: 1;
    text-transform: uppercase;
  }

  .tagline {
    font-size: 22px;
    color: #888aaa;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  .demo {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 8px;
  }

  .demo-text {
    font-size: 26px;
    color: #e0e0f0;
    background: #12121a;
    border: 1px solid #1e1e2e;
    border-radius: 8px;
    padding: 10px 22px;
    letter-spacing: 0.05em;
  }

  .arrow {
    font-size: 28px;
    color: #555570;
  }

  .demo-dna {
    font-size: 20px;
    background: #12121a;
    border: 1px solid #1e1e2e;
    border-radius: 8px;
    padding: 10px 22px;
    letter-spacing: 0.08em;
  }

  .by {
    font-size: 16px;
    color: #4dffb4;
    letter-spacing: 0.2em;
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="blob1"></div>
<div class="blob2"></div>

<div class="dna-top">
  <span class="A">A</span><span class="T">T</span><span class="C">C</span><span class="G">G</span><span class="T">T</span><span class="A">A</span><span class="G">G</span><span class="C">C</span><span class="A">A</span><span class="T">T</span><span class="G">G</span><span class="C">C</span><span class="A">A</span><span class="T">T</span><span class="C">C</span><span class="G">G</span><span class="A">A</span><span class="T">T</span><span class="C">C</span><span class="G">G</span><span class="A">A</span><span class="T">T</span><span class="C">C</span><span class="G">G</span><span class="A">A</span><span class="T">T</span><span class="C">C</span><span class="G">G</span><span class="A">A</span><span class="T">T</span><span class="C">C</span><span class="G">G</span><span class="A">A</span><span class="T">T</span><span class="C">C</span><span class="G">G</span><span class="A">A</span><span class="T">T</span><span class="C">C</span><span class="G">G</span><span class="A">A</span><span class="T">T</span><span class="C">C</span><span class="G">G</span><span class="T">T</span><span class="A">A</span><span class="G">G</span><span class="C">C</span><span class="A">A</span><span class="T">T</span><span class="G">G</span><span class="C">C</span><span class="A">A</span><span class="T">T</span><span class="C">C</span><span class="G">G</span>
</div>

<div class="center">
  <h1>
    <span class="A">G</span><span class="T">e</span><span class="C">n</span><span class="G">e</span><span style="color:#e0e0f0">ncoder</span>
  </h1>

  <div class="tagline">encode anything into DNA</div>

  <div class="demo">
    <div class="demo-text">你好 Hello</div>
    <div class="arrow">→</div>
    <div class="demo-dna">
      <span class="T">T</span><span class="G">G</span><span class="A">A</span><span class="C">C</span><span class="T">T</span><span class="A">A</span><span class="G">G</span><span class="C">C</span><span class="A">A</span><span class="T">T</span><span class="G">G</span><span class="C">C</span><span class="T">T</span><span class="A">A</span><span class="C">C</span><span class="G">G</span><span class="T">T</span><span class="C">C</span><span class="A">A</span>
    </div>
  </div>

  <div class="by">by @bioconstructor_tw</div>
</div>

<div class="dna-bottom">
  <span class="G">G</span><span class="C">C</span><span class="T">T</span><span class="A">A</span><span class="G">G</span><span class="T">T</span><span class="C">C</span><span class="A">A</span><span class="T">T</span><span class="G">G</span><span class="C">C</span><span class="A">A</span><span class="G">G</span><span class="C">C</span><span class="T">T</span><span class="A">A</span><span class="G">G</span><span class="T">T</span><span class="C">C</span><span class="A">A</span><span class="T">T</span><span class="G">G</span><span class="C">C</span><span class="A">A</span><span class="G">G</span><span class="C">C</span><span class="T">T</span><span class="A">A</span><span class="G">G</span><span class="T">T</span><span class="C">C</span><span class="A">A</span><span class="T">T</span><span class="G">G</span><span class="C">C</span><span class="A">A</span><span class="G">G</span><span class="C">C</span><span class="T">T</span><span class="A">A</span><span class="G">G</span><span class="T">T</span><span class="C">C</span><span class="A">A</span><span class="T">T</span><span class="G">G</span><span class="C">C</span><span class="A">A</span><span class="G">G</span><span class="C">C</span><span class="T">T</span><span class="A">A</span>
</div>
</body>
</html>
